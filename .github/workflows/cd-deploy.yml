# ═══════════════════════════════════════════════════════════════════
#  Task 2 – Protected Environments  &  Task 4 – Automated Rollback
#
#  This workflow handles the full CD pipeline:
#    1. Deploy to Staging (automatic after CI passes)
#    2. Smoke-test the staging deployment
#    3. Await manual approval for Production (Required Reviewer)
#    4. Deploy to Production using the PROD_API_KEY environment secret
#    5. Run a production smoke test – auto-rollback if it fails
#
#  Prerequisites (configure in GitHub → Settings → Environments):
#    Environment: staging
#      • No required reviewers
#    Environment: production
#      • Required Reviewer: <your GitHub username>
#      • Secret: PROD_API_KEY = <mock value>
# ═══════════════════════════════════════════════════════════════════
name: CD – Deploy with Protected Environments

on:
  workflow_run:
    workflows: [ "CI – Quality Gates" ]
    types: [ completed ]
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────────────────────────
  #  JOB 1 – Deploy to Staging
  #  Runs automatically after CI passes. Uses staging secrets only.
  # ──────────────────────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy → Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: staging
      url: https://staging.ci-demo.example.com

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract artifact
        run: tar -xzf release-*.tar.gz

      - name: Deploy to Staging
        run: |
          echo "🚀 Deploying SHA ${{ github.event.workflow_run.head_sha }} to STAGING..."
          echo "   (In a real setup this would rsync/kubectl apply/helm upgrade)"
          echo "STAGING_DEPLOY=success" >> $GITHUB_ENV

      - name: Record deployed SHA for rollback
        run: echo "${{ github.event.workflow_run.head_sha }}" > .last-good-staging-sha

  # ──────────────────────────────────────────────────────────────
  #  JOB 2 – Staging Smoke Test  (Task 4)
  #  A lightweight health-check that proves the deployment is alive.
  #  If it fails, an automated rollback message is triggered.
  # ──────────────────────────────────────────────────────────────
  smoke-test-staging:
    name: 🔥 Smoke Test → Staging
    runs-on: ubuntu-latest
    needs: [ deploy-staging ]
    environment:
      name: staging

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run smoke test
        id: smoke
        run: node src/index.test.js   # Reuse unit tests as a smoke check

      - name: ✅ Smoke test passed
        if: success()
        run: echo "Staging smoke test PASSED – environment is healthy."

      # ── Automated Rollback on Failure ──────────────────────────
      - name: ❌ Smoke test FAILED – trigger automated rollback
        if: failure()
        run: |
          echo "::error::Smoke test FAILED on staging!"
          echo "🔄 Initiating automated rollback..."
          echo "   Rolling back to previous stable deployment..."
          echo "   (In production: kubectl rollout undo / helm rollback)"
          echo ""
          echo "📢 On-call notification would be sent here via PagerDuty / Slack webhook."
          exit 1   # Fail the job to block promotion to production

  # ──────────────────────────────────────────────────────────────
  #  JOB 3 – Deploy to Production
  #  Blocked behind a Required Reviewer gate (configured in GitHub
  #  environment settings). Uses the PROD_API_KEY secret.
  # ──────────────────────────────────────────────────────────────
  deploy-production:
    name: 🏭 Deploy → Production
    runs-on: ubuntu-latest
    needs: [ smoke-test-staging ]
    environment:
      name: production
      url: https://ci-demo.example.com

    env:
      # Task 2: Secret injected from the "production" environment
      PROD_API_KEY: ${{ secrets.PROD_API_KEY }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract artifact
        run: tar -xzf release-*.tar.gz

      - name: Verify secret is available (never print value!)
        run: |
          if [ -z "$PROD_API_KEY" ]; then
            echo "::error::PROD_API_KEY secret is not set!"
            exit 1
          fi
          echo "✅ PROD_API_KEY is present (value masked)"

      - name: Deploy to Production
        run: |
          echo "🏭 Deploying SHA ${{ github.event.workflow_run.head_sha }} to PRODUCTION..."
          echo "   Authenticating with PROD_API_KEY..."
          echo "   (In a real setup: helm upgrade --install with --set apiKey=\$PROD_API_KEY)"
          echo "PRODUCTION_DEPLOY=success" >> $GITHUB_ENV

  # ──────────────────────────────────────────────────────────────
  #  JOB 4 – Production Smoke Test + Rollback  (Task 4)
  # ──────────────────────────────────────────────────────────────
  smoke-test-production:
    name: 🔥 Smoke Test → Production
    runs-on: ubuntu-latest
    needs: [ deploy-production ]
    environment:
      name: production

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run production smoke test
        id: prod-smoke
        run: node src/index.test.js

      - name: ✅ Production smoke test passed
        if: success()
        run: echo "🎉 Production deployment verified and healthy!"

      - name: ❌ Production smoke test FAILED – automated rollback
        if: failure()
        run: |
          echo "::error::CRITICAL: Production smoke test FAILED!"
          echo "🔄 Initiating automated production rollback..."
          echo "   Step 1: Re-route traffic to previous Blue environment"
          echo "   Step 2: kubectl rollout undo deployment/ci-demo"
          echo "   Step 3: Verify rollback health..."
          echo "   Step 4: Notify on-call engineer via PagerDuty"
          echo ""
          echo "📢 Rollback complete. Incident ticket created automatically."
          exit 1
